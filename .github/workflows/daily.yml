name: Daily YouTube Catchup

on:
  workflow_dispatch:

  schedule:
    # Every 5 minutes (TEST ONLY)
    - cron: "30 13 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f "requirements.txt" ]; then
            echo "Installing from requirements.txt..."
            python -m pip install -r requirements.txt
          else
            echo "requirements.txt not found. Installing packages manually..."
            python -m pip install requests feedparser yt-dlp
          fi

      - name: Run YouTube Catchup Script
        env:
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
        run: |
          python -u rss_test.py