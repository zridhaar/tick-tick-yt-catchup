name: Daily YouTube Catchup

on:
  workflow_dispatch:

  schedule:
    # 7:00 PM IST = 1:30 PM UTC
    - cron: "30 13 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Environment
        run: |
          echo "Current Directory:"
          pwd

          echo ""
          echo "Repository Files:"
          ls -la

          echo ""
          echo ".github Folder:"
          ls -R .github || true

          echo ""
          echo "Python Version:"
          python --version

          echo ""
          echo "Pip Version:"
          pip --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Installed Packages
        run: |
          pip list

      - name: Verify Required Files
        run: |
          test -f rss_test.py && echo "✓ rss_test.py found"
          test -f youtube_channels.txt && echo "✓ youtube_channels.txt found"
          test -f requirements.txt && echo "✓ requirements.txt found"

      - name: Run Python Script
        env:
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
        run: |
          python -u rss_test.py